server:
  port: ${PORT:8008}

spring:
  application:
    name: payment-gateway-service
  output:
    ansi:
      enabled: always
  main:
    banner-mode: off

logging:
  level:
    root: INFO
    com.gdb.payment: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} - %clr(%-5level) %clr(%logger{0}){cyan} : %msg%n"

springdoc:
  api-docs:
    path: /api/v1/api-docs
  swagger-ui:
    path: /docs

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://eureka-server:8761/eureka}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}
